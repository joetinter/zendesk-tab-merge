<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Zendesk Tab Merge</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1f2937;
      width: 300px;
    }

    /* ── Header ── */
    header {
      background: #03363d;
      color: #ffffff;
      padding: 14px 16px 12px;
    }
    header h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }
    header p {
      font-size: 11px;
      opacity: 0.6;
      margin-top: 3px;
    }

    /* ── Body ── */
    .content {
      padding: 14px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── Section label ── */
    .section-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9ca3af;
    }

    /* ── Option row ── */
    .option-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .option-row:hover { background: #f9fafb; }

    .option-row input[type="checkbox"] {
      margin-top: 2px;
      accent-color: #03363d;
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .option-text { cursor: pointer; line-height: 1; }
    .option-text strong {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #111827;
      margin-bottom: 4px;
    }
    .option-text span {
      font-size: 11px;
      color: #6b7280;
      line-height: 1.4;
    }

    /* ── Status ── */
    .status {
      font-size: 11px;
      color: transparent;
      text-align: center;
      height: 14px;
      transition: color 0.2s;
    }
    .status.visible { color: #059669; }

    /* ── Footer ── */
    footer {
      border-top: 1px solid #f3f4f6;
      padding: 8px 16px;
      font-size: 10px;
      color: #d1d5db;
      text-align: right;
    }
  </style>
</head>
<body>

  <header>
    <h1>Zendesk Tab Merge</h1>
    <p>v2.0</p>
  </header>

  <div class="content">

    <div class="section-title">Settings</div>

    <label class="option-row" for="mergeExternal">
      <input type="checkbox" id="mergeExternal">
      <div class="option-text">
        <strong>Merge tabs for external Zendesk instances</strong>
        <span>
          Merge ticket tabs from other Zendesk subdomains
          (e.g.&nbsp;company.zendesk.com) into their own single tab.
        </span>
      </div>
    </label>

    <div class="status" id="status">Settings saved</div>

  </div>

  <footer>support.zendesk.com always merged</footer>

  <script src="popup.js"></script>
</body>
</html>
